<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Chỉnh sửa nhân vật số</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />

  <link rel="stylesheet" href="../layout/layout.css" />
  <link rel="stylesheet" href="./digital.css" />
</head>

<body data-page="digital-edit" class="digital-page">

<div class="layout">

  <div id="sidebar"></div>

  <div class="main">

    <div id="header"></div>

    <main class="content">

      <div class="page-back" id="btnBack">
        <i class="fa-solid fa-chevron-left"></i>
        <h1>Chỉnh sửa nhân vật số</h1>
      </div>

      <div class="form-card">

        <div class="form-grid">

          <!-- ID -->
          <div class="form-item">
            <label>Mã</label>
            <input id="digitalId" type="text" readonly />
          </div>

          <!-- NAME -->
          <div class="form-item">
            <label>Tên <span>*</span></label>
            <input id="digitalName" type="text" placeholder="Nhập tên" required />
          </div>

          <!-- GENDER -->
          <div class="form-item">
            <label>Giới tính <span>*</span></label>
            <select id="gender" required>
              <option value="1">Nam</option>
              <option value="0">Nữ</option>
            </select>
          </div>

          <!-- JOB -->
          <div class="form-item">
            <label>Nghề nghiệp <span>*</span></label>
            <input
              id="jobId"
              type="text"
              placeholder="Nhập mã nghề nghiệp (VD: NN001)"
              required
            />
          </div>

        </div>

        <!-- APPEARANCE -->
        <div class="form-item full">
          <label>Ngoại hình <span>*</span></label>
          <textarea
            id="appearance"
            placeholder="Mô tả ngoại hình..."
            required
          ></textarea>
        </div>

        <!-- PROMPT -->
        <div class="form-item full">
          <label>Mô tả chi tiết <span>*</span></label>
          <textarea
            id="systemPrompt"
            placeholder="Nhập mô tả..."
            required
          ></textarea>
        </div>

        <!-- AVATAR -->
        <div class="form-item full">

          <label>Ảnh đại diện</label>

          <div class="upload-box" id="avatarBox">

            <img
              id="avatarPreview"
              class="preview-avatar hidden"
              alt="Xem trước ảnh đại diện"
            />

            <i class="fa-solid fa-cloud-arrow-up" id="uploadIcon"></i>

            <p id="uploadText">
              Nhấn để tải lên hoặc kéo & thả
            </p>

            <button
              type="button"
              class="remove-avatar hidden"
              id="btnRemoveAvatar"
            >
              Xóa ảnh
            </button>

          </div>

          <input
            type="file"
            id="avatarInput"
            accept="image/*"
            hidden
          />

        </div>

        <!-- ACTION -->
        <div class="form-actions">

          <button type="button" class="btn-save" id="btnSave">
            Lưu
          </button>

          <button type="button" class="btn-cancel" id="btnCancel">
            Hủy
          </button>

        </div>

      </div>

    </main>

  </div>

</div>

<div id="popup"></div>

<script type="module" src="../layout/layout.js"></script>
<script type="module" src="./digital.js"></script>

</body>
</html>
