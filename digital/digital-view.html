<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Thông tin nhân vật số</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <link rel="stylesheet" href="../layout/layout.css" />
  <link rel="stylesheet" href="./digital.css" />
</head>

<body data-page="digital-view" class="digital-page">

<div class="layout">

  <div id="sidebar"></div>

  <div class="main">

    <div id="header"></div>

    <main class="content">

      <div class="page-back" id="btnBack">
        <i class="fa-solid fa-chevron-left"></i>
        <h1>Thông tin nhân vật số</h1>
      </div>

      <div class="info-card">

        <h2 id="digitalTitle"></h2>

        <div class="info-grid">

          <div class="info-text">

            <p><strong>ID:</strong> <span id="digitalId"></span></p>

            <p><strong>Tên:</strong> <span id="digitalName"></span></p>

            <p><strong>Giới tính:</strong> <span id="digitalGender"></span></p>

            <p><strong>Nghề nghiệp:</strong> <span id="digitalJob"></span></p>

            <h4>Ngoại hình:</h4>

            <p id="digitalAppearance"></p>

            <h4>Mô tả chi tiết:</h4>

            <p id="digitalPrompt"></p>

          </div>

          <div class="info-avatar">

            <img id="digitalAvatar" />

          </div>

        </div>

      </div>

    </main>

  </div>

</div>

<div id="popup"></div>

<script type="module" src="../layout/layout.js"></script>
<script type="module" src="./digital.js"></script>

</body>
</html>
