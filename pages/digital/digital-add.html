<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm nhân vật số | Care AI</title>
    <!-- Scripts -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../../assets/css/global.css">
    <link rel="stylesheet" href="../../assets/css/ui.css">
    <link rel="stylesheet" href="../../assets/css/layout.css">
    <link rel="stylesheet" href="digital-add.css">
    <!-- Layout Component -->
    <script src="../../layout/layout.js" defer></script>
</head>

<body class="digital-page" data-page="digital-add">
    <div class="dashboard-layout">
        <div id="sidebar-target"></div>
        <div class="dashboard-content">
            <div id="header-target"></div>
            <main class="main-body animate-fade-in">
                <section class="page-header">
                    <div class="page-header__title">
                        <h2 class="page-title">Thêm nhân vật mới</h2>
                        <p class="page-subtitle">Thiết lập thông tin định danh cho nhân vật ảo trong hệ thống Clinical
                            Portal.</p>
                    </div>
                </section>

                <div class="form-card-premium">
                    <div class="avatar-upload-section">
                        <div class="avatar-preview-container">
                            <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
                                alt="Avatar Preview" class="avatar-preview" id="avatarPreview">
                        </div>
                        <div class="avatar-upload-info">
                            <h3>Ảnh đại diện nhân vật</h3>
                            <p>Tải lên hình ảnh khuôn mặt rõ nét. Định dạng hỗ trợ: JPG, PNG (Tối đa 5MB).</p>
                            <div class="avatar-actions">
                                <button type="button" class="btn-pill btn-pill--secondary btn-upload" id="avatarBox">
                                    <span id="uploadText">Tải ảnh lên</span>
                                    <input type="file" id="avatarInput" accept="image/*" hidden>
                                </button>
                                <button type="button" class="btn-pill btn-pill--danger btn-delete-avatar hidden" id="btnRemoveAvatar">Xóa
                                    ảnh</button>
                            </div>
                        </div>
                    </div>

                    <form class="digital-entry-form">
                        <div class="form-group-full">
                            <label>Họ và tên</label>
                            <input type="text" placeholder="Nhập họ và tên đầy đủ của nhân vật" class="form-input-v2" id="digitalName">
                        </div>

                        <div class="form-grid-2">
                            <div class="form-group-v2">
                                <label>Mã định danh nhân vật</label>
                                <input type="text" placeholder="Ví dụ:NV001" class="form-input-v2" id="digitalId">
                            </div>
                            <div class="form-group-v2">
                                <label>Giới tính</label>
                                <div class="gender-selection-group" id="genderSwitcher">
                                    <div class="gender-opt active" data-value="1">Nam</div>
                                    <div class="gender-opt" data-value="0">Nữ</div>
                                    <div class="gender-opt" data-value="2">Khác</div>
                                </div>
                                <input type="hidden" id="gender" value="1">
                            </div>
                        </div>

                        <div class="form-group-full">
                            <label>Nghề nghiệp / Vai trò</label>
                            <input type="text" placeholder="Ví dụ: Bác sĩ khoa nhi, Chuyên gia dinh dưỡng..."
                                class="form-input-v2" id="jobId">
                        </div>

                        <div class="form-group-full">
                            <label>Ngoại hình</label>
                            <textarea placeholder="Mô tả các đặc điểm nhận dạng, trang phục, sắc thái khuôn mặt..."
                                class="textarea-v2" id="appearance"></textarea>
                        </div>

                        <div class="form-group-full">
                            <label>Mô tả chi tiết</label>
                            <textarea placeholder="Tiểu sử, tính cách, cách giao tiếp với bệnh nhân..."
                                class="textarea-v3" id="systemPrompt"></textarea>
                        </div>

                        <div class="form-footer-actions j-end">
                            <button type="button" class="btn-pill btn-pill--secondary" id="btnCancel">Hủy bỏ</button>
                            <button type="button" class="btn-pill btn-pill--primary" id="btnSave">
                                <span>Tạo nhân vật</span>
                            </button>
                        </div>
                    </form>
                </div>
            </main>
        </div>
    </div>
    <script src="../../assets/js/main.js"></script>
    <script src="../../assets/js/ui.js"></script>
    <script src="digital.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
