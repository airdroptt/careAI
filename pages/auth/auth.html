<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <title>Admin Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />



    <link rel="stylesheet" href="../../assets/css/global.css">
    <link rel="stylesheet" href="auth.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="login-wrapper">
        <div class="login-card">
            <img src="../../assets/images/logo.png" alt="Logo" class="logo">

            <h1>Đăng nhập</h1>
            <p class="subtitle">Nhập thông tin đăng nhập của bạn để truy cập bảng quản trị.</p>

            <div class="form-group">
                <label for="sdt">Số điện thoại</label>
                <input type="text" id="sdt" placeholder="03xxxxxxxx" required />
            </div>

            <div class="form-group password-group">
                <label for="password">Mật khẩu</label>

                <div class="password-field">
                    <input type="password" id="password" placeholder="Nhập mật khẩu" required />
                    <span class="toggle" onclick="togglePassword()" aria-label="Hiển thị/Ẩn mật khẩu">
                        <i data-lucide="eye-off" id="eyeIcon"></i>
                    </span>
                </div>

                <p id="loginError" class="error-text"></p>
            </div>

            <button onclick="login()">Đăng nhập</button>

            <p class="demo">
                Tài khoản dùng thử: 09xxxxxxxx / admin123
            </p>
        </div>
    </div>
    <script src="../../assets/js/main.js"></script>
    <script src="../../assets/js/ui.js"></script>
    <script src="auth.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
