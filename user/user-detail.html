<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<title>Chi tiết người dùng</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<link rel="stylesheet" href="../layout/layout.css" />
<link rel="stylesheet" href="./user.css" />

</head>

<body data-page="user-detail">

<div class="layout">

<div id="sidebar"></div>

<div class="main">

<div id="header"></div>

<main class="content users-page">

<!-- HEADER -->
<div class="detail-header">

<a href="./user.html" class="back-btn">
<i class="fa-solid fa-chevron-left"></i>
</a>

<h1>Chi tiết người dùng</h1>

<div class="header-actions">
<button class="btn-delete">Xóa</button>
<a id="editBtn" class="btn-edit">Chỉnh sửa</a>
</div>

</div>

<!-- CARD -->
<div class="detail-card">

<!-- PROFILE -->
<div class="profile">

<img id="avatar"
src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
/>

<div>
<h2 id="name">-</h2>
<p class="updated" id="updated">-</p>
</div>

</div>

<!-- BASIC INFO -->
<div class="block">

<h3>Thông tin</h3>
<p class="sub">Thông tin cơ bản</p>

<div class="form-item">
<label>Họ và tên</label>
<div class="info-box" id="fullName">-</div>
</div>

<div class="form-item">
<label>Ngày sinh</label>
<div class="info-box" id="dob">-</div>
</div>

<div class="form-item">
<label>Giới tính</label>
<div class="info-box" id="gender">-</div>
</div>

<div class="form-item">
<label>Chiều cao</label>
<div class="info-box" id="height">-</div>
</div>

<div class="form-item">
<label>Cân nặng</label>
<div class="info-box" id="weight">-</div>
</div>

</div>

<!-- CONTACT -->
<div class="block">

<p class="sub">Thông tin liên hệ</p>

<div class="form-item">
<label>Số điện thoại</label>
<div class="info-box" id="phone">-</div>
</div>

<div class="form-item">
<label>Email</label>
<div class="info-box" id="email">-</div>
</div>

<div class="form-item">
<label>Địa chỉ</label>
<div class="info-box" id="address">-</div>
</div>

</div>

</div>

</main>

</div>

</div>

<div id="popup"></div>

<script type="module" src="../layout/layout.js"></script>
<script type="module" src="./user.js"></script>

</body>
</html>
