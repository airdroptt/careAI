<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8" />
<title>Chỉnh sửa người dùng</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<link rel="stylesheet" href="../layout/layout.css" />
<link rel="stylesheet" href="./user.css" />
</head>

<body data-page="user-edit">

<div class="layout">

<div id="sidebar"></div>

<div class="main">

<div id="header"></div>

<main class="content users-page">

<div class="detail-header">

<a href="./user.html" class="back-btn">
<i class="fa-solid fa-chevron-left"></i>
</a>

<h1>Chỉnh sửa người dùng</h1>

</div>

<div class="detail-card">

<!-- AVATAR -->
<div class="edit-avatar">

<img id="avatarPreview"
src="https://cdn-icons-png.flaticon.com/512/149/149071.png"/>

<input type="file"
id="avatarInput"
accept="image/*"
hidden/>

<button type="button"
class="btn-outline"
id="btnChangeAvatar">
Thay đổi ảnh đại diện
</button>

</div>

<!-- BASIC INFO -->
<div class="block">

<h3>Thông tin</h3>
<p class="sub">Thông tin cơ bản</p>

<div class="form-item">
<label>Họ và tên</label>
<input id="tenND"/>
</div>

<div class="form-item">
<label>Ngày sinh</label>
<input id="ngaySinh" type="date"/>
</div>

<div class="form-item">
<label>Giới tính</label>
<select id="gioiTinh">
<option value="0">Nữ</option>
<option value="1">Nam</option>
</select>
</div>

<div class="form-item">
<label>Chiều cao (cm)</label>
<input id="chieuCao"/>
</div>

<div class="form-item">
<label>Cân nặng (kg)</label>
<input id="canNang"/>
</div>

</div>

<!-- CONTACT -->
<div class="block">

<p class="sub">Thông tin liên hệ</p>

<div class="form-item">
<label>Số điện thoại</label>
<input id="soDienThoai"/>
</div>

<div class="form-item">
<label>Email</label>
<input id="email"/>
</div>

<div class="form-item">
<label>Địa chỉ</label>
<input id="diaChi"/>
</div>

</div>

<div class="form-actions">

<button type="button" class="btn-save">Lưu</button>

<button type="button" class="btn-cancel">
Hủy
</button>

</div>

</div>

</main>

</div>

</div>

<div id="popup"></div>

<script type="module" src="../layout/layout.js"></script>
<script type="module" src="./user.js"></script>

</body>
</html>
