<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Users</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />

  <link rel="stylesheet" href="../layout/layout.css" />
  <link rel="stylesheet" href="./user.css" />
</head>

<body data-page="user" class="user-page">

<div class="layout">

  <!-- SIDEBAR -->
  <div id="sidebar"></div>

  <div class="main">

    <!-- HEADER -->
    <div id="header"></div>

    <main class="content users-page">

      <!-- PAGE TITLE -->
      <h1 class="page-title">
        Người dùng
      </h1>

      <!-- SEARCH -->
      <div class="filter-bar">
        <div class="search">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input
  id="searchUser"
  type="text"
  placeholder="Tìm kiếm người dùng..."
/>
        </div>
      </div>

      <!-- TABLE -->
      <div class="table-wrapper">

        <table class="user-table">

          <thead>
            <tr>
              <th style="width:60px">STT</th>
              <th>Họ và tên</th>
              <th>Số điện thoại</th>
              <th>Ngày sinh</th>
              <th>Ngày tạo</th>
              <th style="width:80px" class="th-action">Thao tác</th>
            </tr>
          </thead>

          <!-- JS render user -->
          <tbody id="userTable"></tbody>

        </table>

      </div>

    </main>

  </div>

</div>

<!-- POPUP GLOBAL -->
<div id="popup"></div>

<script type="module" src="../layout/layout.js"></script>
<script type="module" src="./user.js"></script>

</body>

</html>
